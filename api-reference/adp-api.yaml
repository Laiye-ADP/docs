openapi: 3.1.0
info:
  title: ADP API
  version: 1.0.0
  description: Laiye ADP 官方 OpenAPI 接口规范，覆盖文档抽取、文档解析、抽取应用管理、积分查询、工作流运行和工作流文件管理。
  license:
    name: MIT
    identifier: MIT
servers:
  - url: https://adp.laiye.com
    description: ADP 生产环境
tags:
  - name: 文档抽取
    description: 从上传的文档中抽取结构化字段。
  - name: 文档解析
    description: 识别上传文档中的文字、版面块和位置信息。
  - name: 应用管理
    description: 创建、修改、删除和查询抽取应用及配置。
  - name: 账户
    description: 查询账户积分和使用情况。
  - name: 工作流
    description: 运行工作流应用并查询执行结果。
  - name: 工作流文件
    description: 上传和管理工作流应用使用的文件。
paths:
  /open/agentic_doc_processor/{tenant_name}/v1/app/doc/extract:
    post:
      tags: [文档抽取]
      summary: 文档抽取（同步接口）
      description: 针对用户上传的文档，调用指定的文档抽取应用，根据应用配置和规则从文件中提取指定内容。同一接口适用于自定义抽取应用、海外发票、收据、采购订单、国内通用票据和卡证等场景。
      operationId: extractDocument
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantName'
        - $ref: '#/components/parameters/AcceptLanguage'
      requestBody:
        $ref: '#/components/requestBodies/DocumentExtractRequest'
      responses:
        '200':
          $ref: '#/components/responses/DocumentExtractResponse'
        '422':
          $ref: '#/components/responses/ValidationError'
  /open/agentic_doc_processor/{tenant_name}/v1/app/doc/extract/create/task:
    post:
      tags: [文档抽取]
      summary: 创建文档抽取异步任务
      description: 创建文档抽取任务并立即返回 task_id。适用于大文档或长时间抽取任务。
      operationId: createDocumentExtractTask
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantName'
        - $ref: '#/components/parameters/AcceptLanguage'
      requestBody:
        $ref: '#/components/requestBodies/DocumentExtractRequest'
      responses:
        '200':
          $ref: '#/components/responses/TaskCreateResponse'
        '422':
          $ref: '#/components/responses/ValidationError'
  /open/agentic_doc_processor/{tenant_name}/v1/app/doc/extract/query/task/{task_id}:
    get:
      tags: [文档抽取]
      summary: 查询文档抽取任务结果
      description: 根据创建任务接口返回的 task_id 查询文档抽取状态和结果。
      operationId: queryDocumentExtractTask
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantName'
        - $ref: '#/components/parameters/TaskId'
      responses:
        '200':
          $ref: '#/components/responses/DocumentExtractResponse'
        '422':
          $ref: '#/components/responses/ValidationError'
  /open/agentic_doc_processor/{tenant_name}/v1/app/doc/recognize:
    post:
      tags: [文档解析]
      summary: 文档解析（同步接口）
      description: 接受用户上传的文档，识别文档中的文字内容和文本块位置信息。
      operationId: recognizeDocument
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantName'
        - $ref: '#/components/parameters/AcceptLanguage'
      requestBody:
        $ref: '#/components/requestBodies/DocumentFileRequest'
      responses:
        '200':
          $ref: '#/components/responses/DocumentRecognizeResponse'
        '422':
          $ref: '#/components/responses/ValidationError'
  /open/agentic_doc_processor/{tenant_name}/v1/app/doc/recognize/create/task:
    post:
      tags: [文档解析]
      summary: 创建文档解析异步任务
      description: 创建文档解析任务并立即返回 task_id。
      operationId: createDocumentRecognizeTask
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantName'
        - $ref: '#/components/parameters/AcceptLanguage'
      requestBody:
        $ref: '#/components/requestBodies/DocumentFileRequest'
      responses:
        '200':
          $ref: '#/components/responses/TaskCreateResponse'
        '422':
          $ref: '#/components/responses/ValidationError'
  /open/agentic_doc_processor/{tenant_name}/v1/app/doc/recognize/query/task/{task_id}:
    get:
      tags: [文档解析]
      summary: 查询文档解析任务结果
      description: 根据创建任务接口返回的 task_id 查询文档解析状态和结果。
      operationId: queryDocumentRecognizeTask
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantName'
        - $ref: '#/components/parameters/TaskId'
        - $ref: '#/components/parameters/AcceptLanguage'
      responses:
        '200':
          $ref: '#/components/responses/DocumentRecognizeResponse'
        '422':
          $ref: '#/components/responses/ValidationError'
  /open/agentic_doc_processor/{tenant_name}/v1/app-manage/create:
    post:
      tags: [应用管理]
      summary: 创建抽取应用
      description: 创建标准版或高速版自定义抽取应用，并设置标签、字段配置和抽取配置。创建高速版自定义抽取应用时，设置 ai_function 为 1425，且字段和表格子字段需要提供 field_key。
      operationId: createExtractionApp
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantName'
      requestBody:
        $ref: '#/components/requestBodies/ExtractionAppCreateRequest'
      responses:
        '200':
          $ref: '#/components/responses/ExtractionAppResponse'
        '422':
          $ref: '#/components/responses/ValidationError'
  /open/agentic_doc_processor/{tenant_name}/v1/app-manage/delete:
    post:
      tags: [应用管理]
      summary: 删除抽取应用
      description: 删除抽取应用，删除后无法恢复。删除高速版自定义抽取应用时，复用该接口并传入高速版应用的 app_id。
      operationId: deleteExtractionApp
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantName'
      requestBody:
        $ref: '#/components/requestBodies/AppIdRequest'
      responses:
        '200':
          $ref: '#/components/responses/ExtractionAppDeleteResponse'
        '422':
          $ref: '#/components/responses/ValidationError'
  /open/agentic_doc_processor/{tenant_name}/v1/app-manage/update:
    post:
      tags: [应用管理]
      summary: 修改抽取应用
      description: 更新抽取应用的名称、标签、字段配置和抽取配置，并创建新的配置版本。修改高速版自定义抽取应用时，复用该接口并传入高速版应用的 app_id；请求体不需要传 ai_function。高速版自定义抽取应用不支持设置 parse_mode 和 enable_long_doc。
      operationId: updateExtractionApp
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantName'
      requestBody:
        $ref: '#/components/requestBodies/ExtractionAppUpdateRequest'
      responses:
        '200':
          $ref: '#/components/responses/ExtractionAppUpdateResponse'
        '422':
          $ref: '#/components/responses/ValidationError'
  /open/agentic_doc_processor/{tenant_name}/v1/app-manage/config:
    post:
      tags: [应用管理]
      summary: 查询应用配置
      description: 根据 app_id 查询抽取应用配置。查询高速版自定义抽取应用配置时，传入高速版应用的 app_id；不传 config_version 时返回最新配置版本。
      operationId: getExtractionAppConfig
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantName'
      requestBody:
        $ref: '#/components/requestBodies/AppConfigQueryRequest'
      responses:
        '200':
          description: 应用配置。
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppConfigResponse'
              examples:
                highSpeedConfig:
                  value:
                    code: 200
                    message: success
                    data:
                      app_id: app_1425
                      app_name: 高速版发票抽取应用
                      app_label: [invoice, high-speed]
                      config_version: v1
                      extract_fields:
                        - field_name: 发票号码
                          field_type: string
                          field_prompt: 抽取发票上的唯一发票号码。
                      parse_mode: standard
                      enable_long_doc: false
        '422':
          $ref: '#/components/responses/ValidationError'
  /open/agentic_doc_processor/{tenant_name}/v1/app-list:
    get:
      tags: [应用管理]
      summary: 查询应用列表
      description: 查询应用列表。查询高速版自定义抽取应用列表时，设置 ai_function=1425。
      operationId: listExtractionApps
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantName'
        - name: app_name
          in: query
          required: false
          description: 按应用名称过滤，支持模糊匹配。
          schema:
            type: string
        - name: ai_function
          in: query
          required: false
          description: 按 AI 能力过滤。高速版自定义抽取应用传 1425；标准自定义抽取应用传 1406。
          schema:
            type: integer
            enum: [1406, 1425]
        - name: app_type
          in: query
          required: false
          description: 应用类型。1=自定义应用，0=系统预设。
          schema:
            type: integer
            enum: [0, 1]
        - name: with_extra
          in: query
          required: false
          description: 是否查询扩展信息。
          schema:
            type: integer
            enum: [0, 1]
            default: 1
        - name: offset
          in: query
          required: false
          description: 分页偏移量。
          schema:
            type: integer
            default: 0
            minimum: 0
        - name: limit
          in: query
          required: false
          description: 每页数量。
          schema:
            type: integer
            default: 1000
            minimum: 1
      responses:
        '200':
          $ref: '#/components/responses/AppListResponse'
        '422':
          $ref: '#/components/responses/ValidationError'
  /open/agentic_doc_processor/{tenant_name}/v1/app-manage/version/delete:
    post:
      tags: [应用管理]
      summary: 删除抽取应用的配置
      description: 删除应用下某一个版本的字段配置信息。删除高速版自定义抽取应用的配置时，复用该接口并传入高速版应用的 app_id 和要删除的 config_version。
      operationId: deleteExtractionAppVersion
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantName'
      requestBody:
        $ref: '#/components/requestBodies/AppVersionDeleteRequest'
      responses:
        '200':
          $ref: '#/components/responses/ExtractionAppVersionDeleteResponse'
        '422':
          $ref: '#/components/responses/ValidationError'
  /open/agentic_doc_processor/{tenant_name}/v1/app-manage/ai-recommend:
    post:
      tags: [应用管理]
      summary: 智能体生成抽取字段提示词
      description: 基于示例文档或提示词，AI 自动生成字段名称、字段类型和字段提示词等配置参考。传入高速版自定义抽取应用的 app_id 时，会进入高速版自动生成配置服务，返回 common_rule、field_rule、table_rule 等配置预览；该接口不会保存配置版本，也不会自动回填到 Web 页面应用中。高速版应用必须提供 file_url 或 file_base64，prompt 仅作为辅助生成提示。
      operationId: recommendExtractionFields
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantName'
      requestBody:
        $ref: '#/components/requestBodies/AiRecommendRequest'
      responses:
        '200':
          $ref: '#/components/responses/AiRecommendResponse'
        '422':
          $ref: '#/components/responses/ValidationError'
  /open/agentic_doc_processor/{tenant_name}/v1/user/payment:
    post:
      tags: [账户]
      summary: 查看用户积分使用情况
      description: 无需请求体，根据 X-API-KEY 获取当前用户积分信息。
      operationId: getUserPayment
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantName'
      responses:
        '200':
          $ref: '#/components/responses/UserPaymentResponse'
        '422':
          $ref: '#/components/responses/ValidationError'
  /open/agentic_engine/laiye/v1/app/run:
    post:
      tags: [工作流]
      summary: 运行应用（同步接口）
      description: 同步运行工作流应用的发布版本，阻塞等待执行完成后返回结果。
      operationId: runDocFlowApp
      security:
        - EngineApiKeyAuth: []
      requestBody:
        $ref: '#/components/requestBodies/DocFlowRunRequest'
      responses:
        '200':
          $ref: '#/components/responses/DocFlowRunResponse'
        '422':
          $ref: '#/components/responses/ValidationError'
  /open/agentic_engine/laiye/v1/app/run/create/task:
    post:
      tags: [工作流]
      summary: 创建运行应用异步任务
      description: 异步触发工作流应用运行，立即返回 run_id，不等待执行完成。
      operationId: createDocFlowRunTask
      security:
        - EngineApiKeyAuth: []
      requestBody:
        $ref: '#/components/requestBodies/DocFlowRunRequest'
      responses:
        '200':
          $ref: '#/components/responses/DocFlowRunResponse'
        '422':
          $ref: '#/components/responses/ValidationError'
  /open/agentic_engine/laiye/v1/app/run/query/task/{run_id}:
    get:
      tags: [工作流]
      summary: 查询运行结果
      description: 根据 run_id 查询工作流应用运行状态和结果。
      operationId: queryDocFlowRunTask
      security:
        - EngineApiKeyAuth: []
      parameters:
        - $ref: '#/components/parameters/RunId'
      responses:
        '200':
          $ref: '#/components/responses/DocFlowRunResponse'
        '422':
          $ref: '#/components/responses/ValidationError'
  /open/agentic_engine/laiye/files/upload:
    post:
      tags: [工作流文件]
      summary: 文件上传
      description: 上传文件到智能引擎存储，返回文件 ID 和下载地址。上传后的文件可在运行工作流接口的 files 参数中使用。
      operationId: uploadDocFlowFile
      security:
        - EngineApiKeyAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/FileUploadRequest'
      responses:
        '200':
          $ref: '#/components/responses/FileResponse'
        '422':
          $ref: '#/components/responses/ValidationError'
  /open/agentic_engine/laiye/files/{file_id}:
    get:
      tags: [工作流文件]
      summary: 获取文件信息
      description: 根据文件 ID 获取文件元信息。
      operationId: getDocFlowFile
      security:
        - EngineApiKeyAuth: []
      parameters:
        - $ref: '#/components/parameters/FileId'
      responses:
        '200':
          $ref: '#/components/responses/FileResponse'
        '422':
          $ref: '#/components/responses/ValidationError'
  /open/agentic_engine/laiye/files/{file_id}/delete:
    post:
      tags: [工作流文件]
      summary: 删除文件
      description: 删除指定文件。该操作不可恢复。
      operationId: deleteDocFlowFile
      security:
        - EngineApiKeyAuth: []
      parameters:
        - $ref: '#/components/parameters/FileId'
      responses:
        '200':
          $ref: '#/components/responses/FileDeleteResponse'
        '422':
          $ref: '#/components/responses/ValidationError'
components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-KEY
      description: 生产环境的用户 OpenAPI Accessor access_key，在 ADP 平台的「我的 API」中查看。key 被禁用、过期或不属于生产环境时会返回 Accessor not found。
    EngineApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
      description: 工作流智能引擎 API 访问密钥。
  parameters:
    TenantName:
      name: tenant_name
      in: path
      required: true
      description: 租户名称，默认 laiye。
      schema:
        type: string
        default: laiye
    TaskId:
      name: task_id
      in: path
      required: true
      description: 任务 ID。
      schema:
        type: string
    RunId:
      name: run_id
      in: path
      required: true
      description: 运行 ID。
      schema:
        type: string
    FileId:
      name: file_id
      in: path
      required: true
      description: 文件 ID。
      schema:
        type: string
    AcceptLanguage:
      name: accept-language
      in: header
      required: false
      description: 返回字段名称的语言。默认 zh 返回中文字段名；设置为 en 返回英文字段名。
      schema:
        type: string
        enum: [zh, en]
        default: zh
  examples:
    DocumentRecognitionFileBase64:
      summary: 使用文件 Base64
      value:
        file_base64: &documentRecognitionFileBase64 data:image/jpeg;base64,
        app_id: &documentRecognitionAppId ootb_k7m2x9p4v1n8w3q6r5t0y2b4
    DocumentRecognitionFileUrl:
      summary: 使用文件 URL
      value:
        file_url: &documentRecognitionFileUrl https://adp.laiye.com/web/agentic_doc_processor/laiye/file/2003c711818811f1a36200163e358400
        app_id: *documentRecognitionAppId
  requestBodies:
    DocumentFileRequest:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/DocumentFileRequest'
          examples:
            fileUrl:
              $ref: '#/components/examples/DocumentRecognitionFileUrl'
            fileBase64:
              $ref: '#/components/examples/DocumentRecognitionFileBase64'
    DocumentExtractRequest:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/DocumentExtractRequest'
          examples:
            fileUrl:
              value:
                app_id: app_abc123
                file_url: https://adp.laiye.com/web/agentic_doc_processor/laiye/file/2003c711818811f1a36200163e358400
                with_rec_result: false
            fileBase64:
              value:
                app_id: app_abc123
                file_base64: JVBERi0xLjQKJcfs...
                with_rec_result: true
    AppIdRequest:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/AppIdRequest'
          examples:
            standardCustomExtractionApp:
              summary: 删除标准版自定义抽取应用
              value:
                app_id: app_abc123
            highSpeedCustomExtractionApp:
              summary: 删除高速版自定义抽取应用
              value:
                app_id: app_1425
    AppVersionDeleteRequest:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/AppVersionDeleteRequest'
          examples:
            highSpeedConfigVersion:
              summary: 删除高速版自定义抽取应用配置版本
              value:
                app_id: app_1425
                config_version: v2
    ExtractionAppCreateRequest:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ExtractionAppCreateRequest'
          examples:
            standardCustomExtractionApp:
              summary: 创建标准版自定义抽取应用
              value:
                ai_function: 1406
                app_name: 采购单抽取应用
                app_label: [purchase-order]
                extract_fields:
                  - field_name: 订单号
                    field_type: string
                    field_prompt: 抽取采购订单编号。
                  - field_name: 订单日期
                    field_type: date
                    field_prompt: 抽取订单日期。
                parse_mode: standard
                enable_long_doc: false
            highSpeedCustomExtractionApp:
              summary: 创建高速版自定义抽取应用
              value:
                ai_function: 1425
                app_name: 高速版发票抽取应用
                app_label: [invoice, high-speed]
                extract_fields:
                  - field_key: invoice_no
                    field_name: 发票号码
                    field_type: string
                    field_prompt: 抽取发票上的唯一发票号码。
                  - field_key: invoice_date
                    field_name: 开票日期
                    field_type: date
                    field_prompt: 抽取发票开具日期。
                  - field_key: line_items
                    field_name: 明细
                    field_type: table
                    sub_fields:
                      - field_key: item_name
                        field_name: 商品名称
                        field_type: string
                      - field_key: item_date
                        field_name: 日期
                        field_type: date
                enable_field_value_translation: false
    ExtractionAppUpdateRequest:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ExtractionAppUpdateRequest'
          examples:
            highSpeedCustomExtractionApp:
              summary: 修改高速版自定义抽取应用
              value:
                app_id: app_1425
                app_name: 高速版发票抽取应用（新版）
                config_version: v1
                app_label: [invoice, high-speed]
                extract_fields:
                  - field_key: invoice_no
                    field_name: 发票号码
                    field_type: string
                    field_prompt: 抽取发票上的唯一发票号码。
                  - field_key: invoice_date
                    field_name: 开票日期
                    field_type: date
                    field_prompt: 抽取发票开具日期。
                  - field_key: total_amount
                    field_name: 价税合计
                    field_type: string
                    field_prompt: 抽取发票价税合计金额。
                  - field_key: line_items
                    field_name: 明细
                    field_type: table
                    sub_fields:
                      - field_key: item_name
                        field_name: 商品名称
                        field_type: string
                      - field_key: item_amount
                        field_name: 金额
                        field_type: string
                enable_field_value_translation: false
    AppConfigQueryRequest:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/AppConfigQueryRequest'
          examples:
            highSpeedConfig:
              summary: 查询高速版自定义抽取应用配置
              value:
                app_id: app_1425
            highSpeedConfigVersion:
              summary: 查询高速版指定配置版本
              value:
                app_id: app_1425
                config_version: v1
    AiRecommendRequest:
      required: true
