              type: object
              additionalProperties: true
              properties:
                id:
                  type: string
                file_name:
                  type: string
                file_size:
                  type: integer
                content_type:
                  type: string
                download_url:
                  type: string
                status:
                  type: string
    FileDeleteResponse:
      allOf:
        - $ref: '#/components/schemas/SimpleResponse'
        - type: object
          properties:
            data:
              type: object
              properties:
                id:
                  type: string
