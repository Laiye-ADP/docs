        mime_type:
          type: string
        size:
          type: integer
      required: [url, name, mime_type]
    DocFlowRunResponse:
      allOf:
        - $ref: '#/components/schemas/SimpleResponse'
        - type: object
          properties:
            data:
              type: object
              properties:
                run_id:
                  type: string
                status:
                  type: string
                  enum: [pending, running, succeeded, failed, cancelled, paused, timeout]
                output:
                  type:
                    - object
                    - 'null'
                  additionalProperties: true
                error:
                  type:
                    - string
                    - 'null'
                started_at:
                  type: string
                  format: date-time
                ended_at:
                  type:
                    - string
                    - 'null'
                  format: date-time
    FileUploadRequest:
      type: object
      additionalProperties: false
      properties:
        chunk:
          type: string
          format: binary
        application_id:
          type: string
        sharing_scope:
          type: string
          enum: [user, application]
          default: application
      required: [chunk]
    FileResponse:
      allOf:
        - $ref: '#/components/schemas/SimpleResponse'
        - type: object
          properties:
