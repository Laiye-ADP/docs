  schemas:
    SimpleResponse:
      type: object
      properties:
        code:
          oneOf:
            - type: string
            - type: integer
          description: 业务码。成功通常为 success 或 200。
        message:
          type: string
          description: 返回信息。
        tips:
          type:
            - string
            - 'null'
          description: 详细信息，默认为空。
    DocumentFileRequest:
      oneOf:
        - title: 使用文件 URL
          type: object
          additionalProperties: false
          properties:
            app_id:
              default: *documentRecognitionAppId
              type: string
              description: 应用的唯一标识。
            file_url:
              default: *documentRecognitionFileUrl
              type: string
              format: uri
              description: 待处理文件 URL，与 file_base64 二选一。
          required: [app_id, file_url]
          not:
            required: [file_base64]
        - title: 使用文件 Base64
          type: object
          additionalProperties: false
          properties:
            app_id:
              default: *documentRecognitionAppId
              type: string
              description: 应用的唯一标识。
            file_base64:
              default: *documentRecognitionFileBase64
              type: string
              description: 待处理文件 Base64，与 file_url 二选一。
          required: [app_id, file_base64]
          not:
            required: [file_url]
    DocumentExtractRequest:
      oneOf:
        - title: 使用文件 URL
          type: object
          additionalProperties: false
          properties:
            app_id:
              default: app_abc123
              type: string
              description: 应用的唯一标识。
            file_url:
              default: *documentRecognitionFileUrl
              type: string
              format: uri
              description: 待处理文件 URL，与 file_base64 二选一。
            with_rec_result:
              type: boolean
              description: 是否返回文档解析结果。高速版抽取不返回解析结果。
              default: false
          required: [app_id, file_url]
        - title: 使用文件 Base64
          type: object
          additionalProperties: false
          properties:
            app_id:
              default: app_abc123
              type: string
              description: 应用的唯一标识。
            file_base64:
              default: JVBERi0xLjQKJcfs...
              type: string
              description: 待处理文件 Base64，与 file_url 二选一。
            with_rec_result:
              type: boolean
              description: 是否返回文档解析结果。高速版抽取不返回解析结果。
              default: false
          required: [app_id, file_base64]
    DocumentExtractResponse:
      allOf:
        - $ref: '#/components/schemas/SimpleResponse'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/DocumentExtractData'
    DocumentExtractData:
      type: object
      properties:
        task_id:
          type: string
        file_url:
          type: string
        status:
          type: integer
          description: 1=等待，2=解析中，3=抽取中，4=成功，5=失败。
        doc_recognize_result:
          type: array
          items:
            $ref: '#/components/schemas/RecognizePage'
        extraction_result:
          type: array
          items:
            $ref: '#/components/schemas/ExtractionField'
        collaboration_result:
          type: array
          items:
            type: object
            additionalProperties: true
        output_result:
          type: array
          items:
            type: object
            additionalProperties: true
    DocumentRecognizeResponse:
      allOf:
        - $ref: '#/components/schemas/SimpleResponse'
        - type: object
          properties:
            data:
              type: object
              properties:
                task_id:
                  type: string
                file_url:
                  type: string
                status:
                  type: integer
                doc_recognize_result:
                  type: array
                  items:
                    $ref: '#/components/schemas/RecognizePage'
    RecognizePage:
      type: object
      properties:
        page_num:
          type: integer
        document_content:
          type: string
        document_details:
          type: array
          items:
            $ref: '#/components/schemas/DocumentDetail'
    DocumentDetail:
      type: object
      properties:
        type:
          type: string
        text:
          type: string
        position:
          type: array
          items:
            type: object
            properties:
              points:
                type: array
                items:
                  $ref: '#/components/schemas/Point'
        ocr_confidence:
          type: object
          properties:
            ocr_mean_confidence:
              type: number
            ocr_min_confidence:
              type: number
            is_overall_confidence:
              type: integer
    Point:
      type: object
      properties:
        x:
          type: number
        y:
          type: number
    ExtractionField:
      type: object
      additionalProperties: true
      properties:
        field_key:
          type: string
        field_name:
          type: string
        field_values:
          type: array
          items:
            type: object
            additionalProperties: true
        references:
          type: array
          items:
            type: object
            additionalProperties: true
        table_values:
          type: array
          items:
            type: array
            items:
              type: object
              additionalProperties: true
    ExtractionFieldConfig:
      type: object
      additionalProperties: false
      properties:
        field_key:
          type: string
          pattern: '^[A-Za-z][A-Za-z0-9_]{0,63}$'
          description: 字段唯一标识。创建高速版自定义抽取应用时必填；标准版不要求传入。
        field_name:
          type: string
          minLength: 1
          maxLength: 50
          description: 字段名称。
        field_type:
          type: string
          enum: [string, date, table]
          description: 字段类型。表格字段使用 table。
        field_prompt:
          type: string
          description: 字段抽取提示词。
        sub_fields:
          type: array
          description: 表格子字段。field_type 为 table 时必须至少提供 1 个有效子字段。
          items:
            $ref: '#/components/schemas/ExtractionSubFieldConfig'
      required: [field_name, field_type]
    ExtractionSubFieldConfig:
      type: object
      additionalProperties: false
      properties:
        field_key:
          type: string
          pattern: '^[A-Za-z][A-Za-z0-9_]{0,63}$'
          description: 子字段唯一标识。创建高速版自定义抽取应用时必填；标准版不要求传入。
        field_name:
          type: string
          minLength: 1
          maxLength: 50
          description: 子字段名称。
        field_type:
          type: string
          enum: [string, date]
          description: 子字段类型。表格内不允许再嵌套表格。
        field_prompt:
          type: string
          description: 子字段抽取提示词。
      required: [field_name, field_type]
    LongDocConfig:
      type: object
      additionalProperties: false
      properties:
        doc_type:
          type: string
          description: 文档类型。
        doc_desc:
          type: string
          description: 文档类型描述。
      required: [doc_type]
    ExtractionAppCreateRequest:
      description: 先设置 ai_function。ai_function 为 1406 时使用标准版自定义抽取应用参数；为 1425 时使用高速版自定义抽取应用参数。
      discriminator:
        propertyName: ai_function
        mapping:
          '1406': '#/components/schemas/StandardExtractionAppCreateRequest'
          '1425': '#/components/schemas/HighSpeedExtractionAppCreateRequest'
      oneOf:
        - $ref: '#/components/schemas/StandardExtractionAppCreateRequest'
        - $ref: '#/components/schemas/HighSpeedExtractionAppCreateRequest'
    StandardExtractionAppCreateRequest:
      type: object
      additionalProperties: false
      title: 创建标准版自定义抽取应用
      properties:
        ai_function:
          type: integer
          enum: [1406]
          default: 1406
          description: 应用类型。创建标准自定义抽取应用传 1406；不传时默认按 1406 处理。
        app_name:
          type: string
          minLength: 1
          maxLength: 100
          description: 应用名称。
        app_label:
          type: array
          maxItems: 5
          description: 应用标签列表，最多 5 个。
          items:
            type: string
        extract_fields:
          type: array
          maxItems: 20
          description: 抽取字段配置列表，最多 20 个字段。
          items:
            $ref: '#/components/schemas/ExtractionFieldConfig'
        parse_mode:
          type: string
          enum: [standard, advance, fast_vlm, agentic]
          description: |
            解析模式。标准版自定义抽取应用必填；不同模式适用于不同版式复杂度和准确率要求的文档。

            - standard：标准解析，适用于清晰的电子版文档，速度和准确率均衡。
            - advance：增强解析 1.0，适用于印章、签名、多表格等格式较复杂的文档。
            - fast_vlm：增强解析 2.0，适用于复杂版式、扫描件、多表格等文档，提升解析稳定性。
            - agentic：智能解析，自动组合多种模型处理复杂文档，适合准确率要求高的场景。
        enable_field_value_translation:
          type: boolean
          default: false
          description: 是否开启抽取结果翻译，默认关闭。
        enable_long_doc:
          type: boolean
          default: false
          description: 是否开启长文档支持。
        long_doc_config:
          type: array
          maxItems: 5
          description: 长文档配置，仅 enable_long_doc 为 true 时使用。
          items:
            $ref: '#/components/schemas/LongDocConfig'
      required: [ai_function, app_name, extract_fields, parse_mode]
    HighSpeedExtractionAppCreateRequest:
      type: object
      additionalProperties: false
      title: 创建高速版抽取应用
      properties:
        ai_function:
          type: integer
          enum: [1425]
          default: 1425
          description: 应用类型。创建高速版自定义抽取应用固定传 1425。
        app_name:
          type: string
          minLength: 1
          maxLength: 100
          description: 应用名称。
        app_label:
          type: array
          maxItems: 5
          description: 应用标签列表，最多 5 个。
          items:
            type: string
        extract_fields:
          type: array
          minItems: 1
          maxItems: 20
          description: 高速版抽取字段配置列表，最多 20 个字段。每个字段都需要提供 field_key。
          items:
            $ref: '#/components/schemas/HighSpeedExtractionFieldConfig'
        enable_field_value_translation:
          type: boolean
          default: false
          description: 是否开启抽取结果翻译，默认关闭。
      required: [ai_function, app_name, extract_fields]
    HighSpeedExtractionFieldConfig:
      type: object
      additionalProperties: false
      title: 高速版字段
      description: 高速版字段配置。普通字段的 field_type 为 string 或 date，不要传 sub_fields；表格字段的 field_type 为 table，必须传 sub_fields。
      properties:
        field_key:
          type: string
          pattern: '^[A-Za-z][A-Za-z0-9_]{0,63}$'
          description: 字段唯一标识。必须以英文字母开头，只能包含英文字母、数字和下划线，最多 64 个字符。
        field_name:
          type: string
          minLength: 1
          maxLength: 50
          description: 字段名称。
        field_type:
          type: string
          enum: [string, date, table]
          description: 字段类型。普通字段使用 string 或 date；表格字段使用 table。
        field_prompt:
          type: string
          maxLength: 200
          description: 字段抽取提示词。
        sub_fields:
          type: array
          maxItems: 50
          description: 表格子字段。仅 field_type 为 table 时填写，且必须至少提供 1 个有效子字段；普通字段不要传该参数。
          items:
            $ref: '#/components/schemas/HighSpeedExtractionSubFieldConfig'
          examples:
            - - field_key: item_name
                field_name: 商品名称
                field_type: string
      required: [field_key, field_name, field_type]
      allOf:
        - if:
            properties:
              field_type:
                const: table
            required: [field_type]
          then:
            required: [sub_fields]
            properties:
              sub_fields:
                minItems: 1
    HighSpeedExtractionSubFieldConfig:
      type: object
      additionalProperties: false
      properties:
        field_key:
          type: string
          pattern: '^[A-Za-z][A-Za-z0-9_]{0,63}$'
          description: 子字段唯一标识。必须以英文字母开头，只能包含英文字母、数字和下划线，最多 64 个字符。
        field_name:
          type: string
          minLength: 1
          maxLength: 50
          description: 子字段名称。
        field_type:
          type: string
          enum: [string, date]
          description: 子字段类型。表格内不允许再嵌套表格。
        field_prompt:
          type: string
          maxLength: 200
          description: 子字段抽取提示词。
      required: [field_key, field_name, field_type]
    ExtractionAppUpdateRequest:
      oneOf:
        - $ref: '#/components/schemas/StandardExtractionAppUpdateRequest'
        - $ref: '#/components/schemas/HighSpeedExtractionAppUpdateRequest'
    StandardExtractionAppUpdateRequest:
      type: object
      additionalProperties: false
      title: 修改标准版自定义抽取应用
      properties:
        app_id:
          type: string
          description: 应用 ID。
        app_name:
          type: string
          description: 应用名称。不传或传空字符串时不更新应用名称。
        config_version:
          type: string
          description: 当前配置版本。修改后会另存为新版本。
        app_label:
          type: array
          maxItems: 5
          description: 应用标签列表，最多 5 个。
          items:
            type: string
        extract_fields:
          type: array
          maxItems: 20
          description: 抽取字段配置列表，最多 20 个字段。
          items:
            $ref: '#/components/schemas/ExtractionFieldConfig'
        parse_mode:
          type: string
          enum: [standard, advance, fast_vlm, agentic]
          description: |
            解析模式。标准版自定义抽取应用必填；高速版自定义抽取应用不支持设置该参数。

            - standard：标准解析，适用于清晰的电子版文档，速度和准确率均衡。
            - advance：增强解析 1.0，适用于印章、签名、多表格等格式较复杂的文档。
            - fast_vlm：增强解析 2.0，适用于复杂版式、扫描件、多表格等文档，提升解析稳定性。
            - agentic：智能解析，自动组合多种模型处理复杂文档，适合准确率要求高的场景。
        enable_field_value_translation:
          type: boolean
          default: false
          description: 是否开启抽取结果翻译，默认关闭。
        enable_long_doc:
          type: boolean
          default: false
          description: 是否开启长文档支持。标准版自定义抽取应用支持该参数；高速版自定义抽取应用不支持该参数的设置。
        long_doc_config:
          type: array
          maxItems: 5
          description: 长文档配置，仅 enable_long_doc 为 true 时使用。
          items:
            $ref: '#/components/schemas/LongDocConfig'
      required: [app_id, config_version, extract_fields, parse_mode]
    HighSpeedExtractionAppUpdateRequest:
      type: object
      additionalProperties: false
      title: 修改高速版抽取应用
      properties:
        app_id:
          type: string
          description: 高速版自定义抽取应用 ID。
        app_name:
          type: string
          description: 应用名称。不传或传空字符串时不更新应用名称。
        config_version:
          type: string
          description: 当前配置版本。修改后会另存为新版本。
        app_label:
          type: array
          maxItems: 5
          description: 应用标签列表，最多 5 个。
          items:
            type: string
        extract_fields:
          type: array
          minItems: 1
          maxItems: 20
          description: 高速版抽取字段配置列表，最多 20 个字段。每个字段都需要提供 field_key。
          items:
            $ref: '#/components/schemas/HighSpeedExtractionFieldConfig'
        enable_field_value_translation:
          type: boolean
          default: false
          description: 是否开启抽取结果翻译，默认关闭。
      required: [app_id, config_version, extract_fields]
    AppIdRequest:
      type: object
      additionalProperties: false
      properties:
        app_id:
          type: string
          description: 应用 ID。删除高速版自定义抽取应用时，传入高速版应用的 app_id。
      required: [app_id]
    AppVersionDeleteRequest:
      type: object
      additionalProperties: false
      properties:
        app_id:
          type: string
          description: 应用 ID。删除高速版自定义抽取应用配置时，传入高速版应用的 app_id。
        config_version:
          type: string
          description: 要删除的配置版本。
      required: [app_id, config_version]
    AppConfigQueryRequest:
      type: object
      additionalProperties: false
      properties:
        app_id:
          type: string
          description: 应用 ID。查询高速版自定义抽取应用配置时，传入高速版应用的 app_id。
        config_version:
          type: string
          description: 配置版本。可选，默认返回最新版本。
      required: [app_id]
    AiRecommendRequest:
      type: object
      additionalProperties: false
      description: 智能体生成字段配置请求。请求体需提供 file_url 或 file_base64；prompt 可作为辅助生成提示。
      properties:
        app_id:
          type: string
          description: 应用 ID。传入高速版自定义抽取应用时，返回高速版自动生成配置预览。
        file_base64:
          type: string
          description: 文件 Base64 编码。高速版应用与 file_url 二选一必填。
        file_url:
          type: string
          format: uri
          description: 文件 URL。高速版应用与 file_base64 二选一必填。
        prompt:
          type: string
          description: 用户提供的生成提示。需要同时提供文件，并将 prompt 作为辅助说明。
        doc_type:
          type: string
          description: 文档类型。标准版自动生成建议时可传入；高速版会根据文档自动识别。
        doc_type_description:
          type: string
          description: 文档类型描述。标准版自动生成建议时可传入。
      required: [app_id]
      anyOf:
        - required: [file_base64]
        - required: [file_url]
    ExtractionAppResponse:
      allOf:
        - $ref: '#/components/schemas/SimpleResponse'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/AppConfigData'
    ExtractionAppDeleteResponse:
      allOf:
        - $ref: '#/components/schemas/SimpleResponse'
        - type: object
          properties:
            data:
              type: object
              properties:
                success:
                  type: boolean
                  description: 是否删除成功。
                message:
                  type: string
                  description: 操作消息。
    ExtractionAppUpdateResponse:
      allOf:
        - $ref: '#/components/schemas/SimpleResponse'
        - type: object
          properties:
            data:
              type: object
              properties:
                app_id:
                  type: string
                  description: 应用 ID。
                config_version:
                  type: string
                  description: 新配置版本号。
    ExtractionAppVersionDeleteResponse:
      allOf:
        - $ref: '#/components/schemas/SimpleResponse'
        - type: object
          properties:
            data:
              type: object
              properties:
                success:
                  type: boolean
                  description: 是否删除成功。
                message:
                  type: string
                  description: 操作消息。
    AppListResponse:
      allOf:
        - $ref: '#/components/schemas/SimpleResponse'
        - type: object
          properties:
            data:
              type: object
              properties:
                list:
                  type: array
                  items:
                    type: object
                    additionalProperties: true
                total:
                  type: integer
    AppConfigResponse:
      allOf:
        - $ref: '#/components/schemas/SimpleResponse'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/AppConfigData'
    AppConfigData:
      type: object
      additionalProperties: true
      properties:
        app_id:
          type: string
        app_name:
          type: string
        app_label:
          type: array
          items:
            type: string
        config_version:
          type: string
        extract_fields:
          type: array
          items:
            $ref: '#/components/schemas/ExtractionFieldConfig'
        parse_mode:
          type: string
        enable_long_doc:
          type: boolean
        long_doc_config:
          type: array
          items:
            $ref: '#/components/schemas/LongDocConfig'
    AiRecommendResponse:
      allOf:
        - $ref: '#/components/schemas/SimpleResponse'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/AiRecommendData'
    AiRecommendData:
      type: object
      additionalProperties: true
      properties:
        app_id:
          type: string
          description: 应用 ID。
        app_name:
          type: string
          description: 应用名称。
        ai_function:
          type: integer
          enum: [1406, 1425]
          description: 应用类型。1406 表示标准版自定义抽取；1425 表示高速版自定义抽取。
        extract_fields:
          type: array
          description: 兼容字段列表。标准版返回推荐字段；高速版当前返回普通字段预览，完整配置请使用 field_rule 和 table_rule。
          items:
            $ref: '#/components/schemas/AiRecommendFieldConfig'
        prompt_rule:
          type: string
          description: 高速版自动生成配置的整体规则，兼容字段。
        common_rule:
          type: string
          description: 高速版自动生成配置的整体规则。
        field_rule:
          type: array
          description: 高速版自动生成的普通字段配置预览。该字段不会自动保存到应用配置中。
          items:
            $ref: '#/components/schemas/AiRecommendGeneratedRuleField'
        table_rule:
          type: array
          description: 高速版自动生成的表格字段配置预览，采用平铺结构。field_parent_id 为空的记录为表格父字段，field_parent_id 指向父字段 field_key 的记录为表格子字段。
          items:
            $ref: '#/components/schemas/AiRecommendGeneratedRuleField'
        page_count:
          type: integer
          description: 高速版自动生成配置时使用的页数。
        document_type:
          type: string
          description: 高速版自动识别的文档类型。
    AiRecommendFieldConfig:
      type: object
      additionalProperties: true
      properties:
        field_key:
          type: string
          description: 字段唯一标识。高速版自动生成配置时返回。
        field_name:
          type: string
          description: 字段名称。
        field_type:
          type: string
          enum: [string, date, table]
          description: 字段类型。
        field_prompt:
          type:
            - string
            - 'null'
          description: 字段提示词。
        field_description:
          type:
            - string
            - 'null'
          description: 字段描述。
        sub_fields:
          type: array
          description: 表格子字段列表。标准版表格字段可能返回该字段；高速版表格字段请查看 table_rule。
          items:
            $ref: '#/components/schemas/AiRecommendSubFieldConfig'
      required: [field_name, field_type]
    AiRecommendSubFieldConfig:
      type: object
      additionalProperties: true
      properties:
        field_key:
          type: string
          description: 子字段唯一标识。
        field_name:
          type: string
          description: 子字段名称。
        field_type:
          type: string
          enum: [string, date]
          description: 子字段类型。
        field_prompt:
          type:
            - string
            - 'null'
          description: 子字段提示词。
        field_description:
          type:
            - string
            - 'null'
          description: 子字段描述。
      required: [field_name, field_type]
    AiRecommendGeneratedRuleField:
      type: object
      additionalProperties: true
      properties:
        field_key:
          type: string
          description: 字段唯一标识。表格子字段的 field_parent_id 会引用表格父字段的 field_key。
        field_name:
          type: string
          description: 字段名称。
        field_type:
          type: string
          enum: [string, date, table]
          description: 字段类型。table 表示表格父字段。
        field_description:
          type: string
          description: 字段描述。
        field_parent_id:
          type: string
          description: 表格子字段所属的父字段 field_key。为空时表示普通字段或表格父字段。
        config:
          type: object
          additionalProperties: true
          description: 字段扩展配置。
        source:
          type: integer
          description: 字段来源。
        _field_key_source:
          type: string
          description: 模型生成的原始字段 key，仅在服务保留调试信息时返回。
    UserPaymentResponse:
      allOf:
        - $ref: '#/components/schemas/SimpleResponse'
        - type: object
          properties:
            data:
              type: object
              properties:
                total_credits:
                  type: number
                used_credits:
                  type: number
                expired_credits:
                  type: number
                remaining_credits:
                  type: number
    DocFlowRunRequest:
