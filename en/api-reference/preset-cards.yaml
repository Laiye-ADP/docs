openapi: 3.1.0
info:
  title: Cards and certificates
  version: 1.0.0
  description: ADP preset application APIs for extracting cards and certificates.
  license:
    name: MIT
    identifier: MIT
servers:
  - url: https://adp-global.laiye.com
    description: ADP global production endpoint
tags:
  - name: Card and certificate extraction
    description: Extract fields from ID cards, driver licenses, vehicle licenses, bank cards, business licenses, and similar documents.
paths:
  /open/agentic_doc_processor/{tenant_name}/v1/app/doc/extract:
    post:
      tags: [Card and certificate extraction]
      summary: Extract card or certificate (sync)
      description: Extract fields from cards and certificates. Returned fields depend on the preset application configuration.
      operationId: extractCardDocument
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantName'
        - $ref: '#/components/parameters/AcceptLanguage'
      requestBody:
        $ref: '#/components/requestBodies/DocumentExtractRequest'
      responses:
        '200':
          $ref: '#/components/responses/DocumentExtractResponse'
        '422':
          $ref: '#/components/responses/ValidationError'
  /open/agentic_doc_processor/{tenant_name}/v1/app/doc/extract/create/task:
    post:
      tags: [Card and certificate extraction]
      summary: Create card extraction task
      description: Create an async card or certificate extraction task.
      operationId: createCardDocumentExtractTask
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantName'
        - $ref: '#/components/parameters/AcceptLanguage'
      requestBody:
        $ref: '#/components/requestBodies/DocumentExtractRequest'
      responses:
        '200':
          $ref: '#/components/responses/TaskCreateResponse'
        '422':
          $ref: '#/components/responses/ValidationError'
  /open/agentic_doc_processor/{tenant_name}/v1/app/doc/extract/query/task/{task_id}:
    get:
      tags: [Card and certificate extraction]
      summary: Query card extraction result
      description: Query async card or certificate extraction results.
      operationId: queryCardDocumentExtractTask
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantName'
        - $ref: '#/components/parameters/TaskId'
      responses:
        '200':
          $ref: '#/components/responses/DocumentExtractResponse'
        '422':
          $ref: '#/components/responses/ValidationError'
components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-KEY
  parameters:
    TenantName:
      name: tenant_name
      in: path
      required: true
      description: "Tenant name. Default: laiye."
      schema:
        type: string
        default: laiye
    TaskId:
      name: task_id
      in: path
      required: true
      description: Task ID.
      schema:
        type: string
    AcceptLanguage:
      name: accept-language
      in: header
      required: false
      description: Field name language. Use zh for Chinese or en for English.
      schema:
        type: string
        enum: [zh, en]
        default: en
  examples:
    CardsFileBase64:
      summary: Use file Base64
      value:
        file_base64: &cardsFileBase64 data:image/jpeg;base64,
        app_id: &cardsAppId ootb_c2h5k8n1p4q7r0t3v6w9x2y5z8
        with_rec_result: false
    CardsFileUrl:
      summary: Use file URL
      value:
        file_url: &cardsFileUrl https://adp.laiye.com/web/agentic_doc_processor/laiye/file/2003c711818811f1a36200163e358400
        app_id: *cardsAppId
        with_rec_result: false
  requestBodies:
    DocumentExtractRequest:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/DocumentExtractRequest'
          examples:
            fileBase64:
              $ref: '#/components/examples/CardsFileBase64'
            fileUrl:
              $ref: '#/components/examples/CardsFileUrl'
  responses:
    DocumentExtractResponse:
      description: Extraction result.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/DocumentExtractResponse'
    TaskCreateResponse:
      description: Task creation result.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/TaskCreateResponse'
    ValidationError:
      description: Validation error.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/SimpleResponse'
  schemas:
    CardAppId:
      type: string
      default: *cardsAppId
      enum:
        - ootb_c2h5k8n1p4q7r0t3v6w9x2y5z8
        - ootb_n2m5n8p1q4r7t0v3w6x9y2z5a8b1c
        - ootb_k8m2n5p1q4r7t0v3w6x9y2z5a8b4
        - ootb_b7k2m5n8p1q4r7t0v3w6x9y2z5
        - ootb_l5k8n1p4q7r0t3v6w9x2y5z8a1b7
        - ootb_h5m8n1p4q7r0t3v6w9x2y5z8a1b4
        - ootb_j2k5n8p1q4r7t0v3w6x9y2z5a8b1
        - ootb_e5k8n1p4q7r0t3v6w9x2y5z8a1b
        - ootb_f2m5n8p1q4r7t0v3w6x9y2z5a8b
        - ootb_g8k2n5p1q4r7t0v3w6x9y2z5a8b
        - ootb_d9m2p5q8r1t4v7w0x3y6z9a2b5c
      x-enumNames:
        - 银行卡
        - 港澳通行证
        - 组织机构代码证
        - 身份证
        - 户口本
        - 护照-中国
        - 行驶证
        - 开户许可证
        - 驾驶证
        - 营业执照
        - 车辆合格证
      x-enumDescriptions:
        - 银行卡
        - 港澳通行证
        - 组织机构代码证
        - 身份证
        - 户口本
        - 护照-中国
        - 行驶证
        - 开户许可证
        - 驾驶证
        - 营业执照
        - 车辆合格证
      description: |
        Unique identifier of the card preset application. The dropdown uses the submitted app_id values. The card type mapping is:
        - 银行卡: ootb_c2h5k8n1p4q7r0t3v6w9x2y5z8
        - 港澳通行证: ootb_n2m5n8p1q4r7t0v3w6x9y2z5a8b1c
        - 组织机构代码证: ootb_k8m2n5p1q4r7t0v3w6x9y2z5a8b4
        - 身份证: ootb_b7k2m5n8p1q4r7t0v3w6x9y2z5
        - 户口本: ootb_l5k8n1p4q7r0t3v6w9x2y5z8a1b7
        - 护照-中国: ootb_h5m8n1p4q7r0t3v6w9x2y5z8a1b4
        - 行驶证: ootb_j2k5n8p1q4r7t0v3w6x9y2z5a8b1
        - 开户许可证: ootb_e5k8n1p4q7r0t3v6w9x2y5z8a1b
        - 驾驶证: ootb_f2m5n8p1q4r7t0v3w6x9y2z5a8b
        - 营业执照: ootb_g8k2n5p1q4r7t0v3w6x9y2z5a8b
        - 车辆合格证: ootb_d9m2p5q8r1t4v7w0x3y6z9a2b5c
    DocumentExtractRequest:
      oneOf:
        - title: Use file Base64
          type: object
          additionalProperties: false
          properties:
            file_base64:
              default: *cardsFileBase64
              type: string
              description: Base64-encoded file. Use either file_base64 or file_url.
            app_id:
              $ref: '#/components/schemas/CardAppId'
            with_rec_result:
              type: boolean
              default: false
              description: Whether to return the document recognition result.
          required: [app_id, file_base64]
        - title: Use file URL
          type: object
          additionalProperties: false
          properties:
            file_url:
              default: *cardsFileUrl
              type: string
              format: uri
              description: File URL. Use either file_url or file_base64.
            app_id:
              $ref: '#/components/schemas/CardAppId'
            with_rec_result:
              type: boolean
              default: false
              description: Whether to return the document recognition result.
          required: [app_id, file_url]
    SimpleResponse:
      type: object
      properties:
        code:
          oneOf:
            - type: string
            - type: integer
        message:
          type: string
        tips:
          type:
            - string
            - 'null'
    TaskCreateResponse:
      allOf:
        - $ref: '#/components/schemas/SimpleResponse'
        - type: object
          properties:
            data:
              type: object
              properties:
                task_id:
                  type: string
    DocumentExtractResponse:
      allOf:
        - $ref: '#/components/schemas/SimpleResponse'
        - type: object
          properties:
            data:
              type: object
              additionalProperties: true
