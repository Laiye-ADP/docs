openapi: 3.1.0
info:
  title: Purchase orders
  version: 1.0.0
  description: ADP preset application APIs for extracting purchase orders.
  license:
    name: MIT
    identifier: MIT
servers:
  - url: https://adp-global.laiye.com
    description: ADP global production endpoint
tags:
  - name: Purchase order extraction
    description: Extract fields from purchase orders.
paths:
  /open/agentic_doc_processor/{tenant_name}/v1/app/doc/extract:
    post:
      tags: [Purchase order extraction]
      summary: Extract purchase order (sync)
      description: Extract fields from purchase orders. Returned fields depend on the preset application configuration.
      operationId: extractPurchaseOrder
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantName'
        - $ref: '#/components/parameters/AcceptLanguage'
      requestBody:
        $ref: '#/components/requestBodies/DocumentExtractRequest'
      responses:
        '200':
          $ref: '#/components/responses/DocumentExtractResponse'
        '422':
          $ref: '#/components/responses/ValidationError'
  /open/agentic_doc_processor/{tenant_name}/v1/app/doc/extract/create/task:
    post:
      tags: [Purchase order extraction]
      summary: Create purchase order extraction task
      description: Create an async extraction task for a purchase order.
      operationId: createPurchaseOrderExtractTask
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantName'
        - $ref: '#/components/parameters/AcceptLanguage'
      requestBody:
        $ref: '#/components/requestBodies/DocumentExtractRequest'
      responses:
        '200':
          $ref: '#/components/responses/TaskCreateResponse'
        '422':
          $ref: '#/components/responses/ValidationError'
  /open/agentic_doc_processor/{tenant_name}/v1/app/doc/extract/query/task/{task_id}:
    get:
      tags: [Purchase order extraction]
      summary: Query purchase order extraction result
      description: Query async extraction results for a purchase order.
      operationId: queryPurchaseOrderExtractTask
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantName'
        - $ref: '#/components/parameters/TaskId'
      responses:
        '200':
          $ref: '#/components/responses/DocumentExtractResponse'
        '422':
          $ref: '#/components/responses/ValidationError'
components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-KEY
  parameters:
    TenantName:
      name: tenant_name
      in: path
      required: true
      description: "Tenant name. Default: laiye."
      schema:
        type: string
        default: laiye
    TaskId:
      name: task_id
      in: path
      required: true
      description: Task ID.
      schema:
        type: string
    AcceptLanguage:
      name: accept-language
      in: header
      required: false
      description: Field name language. Use zh for Chinese or en for English.
      schema:
        type: string
        enum: [zh, en]
        default: en
  examples:
    PurchaseOrderFileBase64:
      summary: Use file Base64
      value:
        file_base64: &purchaseOrderFileBase64 data:image/jpeg;base64,
        app_id: &purchaseOrderAppId ootb_m9n2p5q8r1t4v7w0x3y6z9a2b5
        with_rec_result: false
    PurchaseOrderFileUrl:
      summary: Use file URL
      value:
        file_url: &purchaseOrderFileUrl https://adp.laiye.com/web/agentic_doc_processor/laiye/file/2003c711818811f1a36200163e358400
        app_id: *purchaseOrderAppId
        with_rec_result: false
  requestBodies:
    DocumentExtractRequest:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/DocumentExtractRequest'
          examples:
            fileBase64:
              $ref: '#/components/examples/PurchaseOrderFileBase64'
            fileUrl:
              $ref: '#/components/examples/PurchaseOrderFileUrl'
  responses:
    DocumentExtractResponse:
      description: Extraction result.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/DocumentExtractResponse'
    TaskCreateResponse:
      description: Task creation result.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/TaskCreateResponse'
    ValidationError:
      description: Validation error.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/SimpleResponse'
  schemas:
    DocumentExtractRequest:
      oneOf:
        - title: Use file Base64
          type: object
          additionalProperties: false
          properties:
            file_base64:
              default: *purchaseOrderFileBase64
              type: string
              description: Base64-encoded file. Use either file_base64 or file_url.
            app_id:
              default: *purchaseOrderAppId
              type: string
              description: Unique identifier of the preset application.
            with_rec_result:
              type: boolean
              default: false
              description: Whether to return the document recognition result.
          required: [app_id, file_base64]
        - title: Use file URL
          type: object
          additionalProperties: false
          properties:
            file_url:
              default: *purchaseOrderFileUrl
              type: string
              format: uri
              description: File URL. Use either file_url or file_base64.
            app_id:
              default: *purchaseOrderAppId
              type: string
              description: Unique identifier of the preset application.
            with_rec_result:
              type: boolean
              default: false
              description: Whether to return the document recognition result.
          required: [app_id, file_url]
    SimpleResponse:
      type: object
      properties:
        code:
          oneOf:
            - type: string
            - type: integer
        message:
          type: string
        tips:
          type:
            - string
            - 'null'
    TaskCreateResponse:
      allOf:
        - $ref: '#/components/schemas/SimpleResponse'
        - type: object
          properties:
            data:
              type: object
              properties:
                task_id:
                  type: string
    DocumentExtractResponse:
      allOf:
        - $ref: '#/components/schemas/SimpleResponse'
        - type: object
          properties:
            data:
              type: object
              additionalProperties: true
