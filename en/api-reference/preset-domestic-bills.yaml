openapi: 3.1.0
info:
  title: Domestic general bills
  version: 1.0.0
  description: ADP preset application API for extracting domestic general bills.
  license:
    name: MIT
    identifier: MIT
servers:
  - url: https://adp-global.laiye.com
    description: ADP global production endpoint
tags:
  - name: Domestic bill extraction
    description: Extract fields from domestic general bills.
paths:
  /open/agentic_doc_processor/{tenant_name}/v1/app/doc/extract:
    post:
      tags: [Domestic bill extraction]
      summary: Extract domestic general bill (sync)
      description: Extract fields from domestic general bills. Returned fields and classification results depend on the preset application configuration.
      operationId: extractDomesticBill
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantName'
      requestBody:
        $ref: '#/components/requestBodies/DocumentExtractRequest'
      responses:
        '200':
          $ref: '#/components/responses/DocumentExtractResponse'
        '422':
          $ref: '#/components/responses/ValidationError'
components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-KEY
  parameters:
    TenantName:
      name: tenant_name
      in: path
      required: true
      description: "Tenant name. Default: laiye."
      schema:
        type: string
        default: laiye
  examples:
    DomesticBillsFileBase64:
      summary: Use file Base64
      value:
        file_base64: &domesticBillsFileBase64 data:image/jpeg;base64,
        app_id: &domesticBillsAppId ootb_v9x2y5z8a1b4c7d0e3f6h9j1k4m7
    DomesticBillsFileUrl:
      summary: Use file URL
      value:
        file_url: &domesticBillsFileUrl https://adp.laiye.com/web/agentic_doc_processor/laiye/file/2003c711818811f1a36200163e358400
        app_id: *domesticBillsAppId
  requestBodies:
    DocumentExtractRequest:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/DocumentExtractRequest'
          examples:
            fileUrl:
              $ref: '#/components/examples/DomesticBillsFileUrl'
            fileBase64:
              $ref: '#/components/examples/DomesticBillsFileBase64'
  responses:
    DocumentExtractResponse:
      description: Extraction result.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/DocumentExtractResponse'
    ValidationError:
      description: Validation error.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/SimpleResponse'
  schemas:
    DocumentExtractRequest:
      oneOf:
        - title: Use file URL
          type: object
          additionalProperties: false
          properties:
            file_url:
              default: *domesticBillsFileUrl
              type: string
              format: uri
              description: File URL. Use either file_url or file_base64.
            app_id:
              default: *domesticBillsAppId
              type: string
              description: Unique identifier of the domestic general bills preset application.
          required: [app_id, file_url]
        - title: Use file Base64
          type: object
          additionalProperties: false
          properties:
            file_base64:
              default: *domesticBillsFileBase64
              type: string
              description: Base64-encoded file. Use either file_base64 or file_url.
            app_id:
              default: *domesticBillsAppId
              type: string
              description: Unique identifier of the domestic general bills preset application.
          required: [app_id, file_base64]
    SimpleResponse:
      type: object
      properties:
        code:
          oneOf:
            - type: string
            - type: integer
        message:
          type: string
        tips:
          type:
            - string
            - 'null'
    DocumentExtractResponse:
      allOf:
        - $ref: '#/components/schemas/SimpleResponse'
        - type: object
          properties:
            data:
              type: object
              additionalProperties: true
